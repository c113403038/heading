<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Page 2</title>
    <style>
        body {
            font-family: serif;
            margin: 20px;
        }

        .container {
            display: inline-block;
            padding: 20px 40px;
            border: 1px solid #d3d3d3;
            box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.2);
            background-color: #ffffff;
            min-width: 600px;
        }

        .h1-style {
            font-size: 48px;
            margin: 0;
            border-top: 5px solid black;
            text-shadow: 2px 2px 2px pink;
            display: inline-block;
        }

        .h2-style {
            font-size: 32px;
            font-style: italic;
            background-color: #ffff00;
            border: 2px solid black;
            padding: 5px 10px;
            margin: 30px 0;
        }

        .h3-wrapper {
            text-align: right;
        }

        .h3-style {
            font-size: 24px;
            text-decoration: underline;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="h1-style">This is heading 1</div>
        
        <div class="h2-style">This is heading 2</div>
        
        <div class="h3-wrapper">
            <div class="h3-style">This is heading 3</div>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Page</title>
    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            margin: 20px;
        }

        .container {
            display: inline-block;
            padding: 30px 50px;
            border: 1px solid #d3d3d3;
            box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.2);
            background-color: #ffffff;
            width: 850px;
        }

        .h1-style {
            font-size: 64px;
            font-weight: bold;
            margin: 0;
            padding-top: 20px;
            position: relative;
            text-shadow: 3px 3px 0px #ffc0cb;
            width: fit-content;
        }

        .h1-style::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background-color: black;
            box-shadow: 3px 3px 0px #ffc0cb;
        }

        .h2-style {
            font-size: 42px;
            font-style: italic;
            font-weight: bold;
            margin: 60px 0;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;

            border: 2px solid black;
            box-shadow: 
                -3px -3px 0px 0px #ffff00, 
                3px 3px 0px 0px #808000,
                -3px 3px 0px 0px #ffff00,
                3px -3px 0px 0px #ffff00,
                0px 0px 0px 3px #ffff00;
        }

        .h3-wrapper {
            text-align: right;
            margin-top: 20px;
        }

        .h3-style {
            font-size: 32px;
            font-weight: bold;
            text-decoration: underline;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="h1-style">This is heading 1</div>
        
        <div class="h2-style">This is heading 2</div>
        
        <div class="h3-wrapper">
            <div class="h3-style">This is heading 3</div>
        </div>
    </div>

</body>
</html>
